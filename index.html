<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<title>Login | HelpDesk</title>

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0d6efd, #0dcaf0);
    height: 100vh;
    overflow: hidden;
}

/* FONDO DIFUMINADO PRO */
body::before{
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    top: -100px;
    left: -100px;
    filter: blur(80px);
}

/* CONTENEDOR */
.wrapper{
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
}

/* TARJETA GLASS 🔥 */
#formContent{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 30px;
    width: 350px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0px 10px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
    color: white;
}

/* ICONO */
#icon{
    width: 80px;
    margin-bottom: 10px;
}

/* INPUTS */
input{
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: 0.3s;
}

input::placeholder{
    color: #eee;
}

input:focus{
    background: rgba(255,255,255,0.3);
}

/* BOTÓN */
input[type="submit"]{
    background: white;
    color: #0d6efd;
    font-weight: bold;
    border: none;
    transition: 0.3s;
}

input[type="submit"]:hover{
    transform: scale(1.05);
    background: #e9ecef;
}

/* LINK */
#formFooter a{
    font-size: 14px;
    color: #fff;
    text-decoration: underline;
}

/* TÍTULO */
h3{
    font-weight: bold;
}

/* ANIMACIÓN */
@keyframes fadeIn{
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="wrapper">
<div id="formContent">

    <img src="https://cdn-icons-png.flaticon.com/512/1000/1000946.png" id="icon">

    <h3 class="mb-3">🔒 HelpDesk</h3>

    <form id="frmLogin" method="POST" onsubmit="return loginUsuario()">

        <input type="text" name="login" placeholder="Usuario" required>

        <input type="password" name="password" placeholder="Contraseña" required>

        <input type="submit" value="Iniciar sesión">

    </form>

    <div id="formFooter">
        <a href="#" data-bs-toggle="modal" data-bs-target="#modalContacto">
            ¿Necesitas acceso?
        </a>
    </div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalContacto" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Contacto</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
📧 Contacta al administrador:<br>
<strong>admin@helpdesk.com</strong>
</div>

</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="public/sweetalert2/sweetalert2@11.js"></script>
<script src="public/js/usuarios/login.js"></script>

</body>
</html>
